<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Project Meridian · TPOC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100dvh;overflow:hidden;background:#030712;font-family:'Rajdhani',sans-serif;color:#e8f4fd;user-select:none;-webkit-user-select:none;touch-action:none;}

body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 18% 45%,rgba(0,25,75,0.55) 0%,transparent 55%),radial-gradient(ellipse at 84% 55%,rgba(22,0,60,0.45) 0%,transparent 50%),radial-gradient(ellipse at 50% 8%,rgba(0,18,55,0.6) 0%,transparent 60%);z-index:0;pointer-events:none;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.012) 2px,rgba(0,0,0,0.012) 4px);pointer-events:none;z-index:200;}

/* ── HEADER ─────────────────────────────── */
#header{
  position:fixed;top:0;left:0;right:0;z-index:50;
  padding:10px 14px;
  background:linear-gradient(to bottom,rgba(3,7,18,0.98) 60%,transparent);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.h-title{font-family:'Orbitron',sans-serif;font-size:clamp(13px,3.5vw,22px);font-weight:900;color:#00d4ff;letter-spacing:.06em;line-height:1.2;text-shadow:0 0 24px rgba(0,212,255,.6);text-transform:uppercase;}
.h-sub{font-size:clamp(9px,2.2vw,12px);color:rgba(232,244,253,.42);letter-spacing:.08em;margin-top:2px;text-transform:uppercase;}

/* ── DESKTOP LEGEND ──────────────────────── */
#legend{position:fixed;left:12px;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:4px;}
.li{display:flex;align-items:center;gap:10px;cursor:pointer;padding:5px 9px;border-radius:5px;transition:all .2s;border:1px solid transparent;}
.li:hover,.li.lit{background:rgba(255,255,255,.05);border-color:rgba(0,212,255,.22);}
.ld{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
.ll{font-size:13px;letter-spacing:.04em;color:rgba(232,244,253,.48);transition:color .2s;white-space:nowrap;}
.li:hover .ll,.li.lit .ll{color:rgba(232,244,253,.92);}

/* ── MOBILE LAYER DRAWER ─────────────────── */
#drawer-toggle{
  display:none;
  position:fixed;left:0;top:50%;transform:translateY(-50%);z-index:60;
  background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.3);
  border-left:none;border-radius:0 8px 8px 0;
  padding:14px 10px;cursor:pointer;
  flex-direction:column;align-items:center;gap:3px;
  transition:opacity .25s, left .25s;
}
#drawer-toggle.hidden{opacity:0;pointer-events:none;left:-40px;}
.dt-icon{font-size:18px;color:#00d4ff;}
.dt-label{font-family:'Orbitron',sans-serif;font-size:8px;color:rgba(0,212,255,.7);letter-spacing:.12em;writing-mode:vertical-rl;text-orientation:mixed;margin-top:4px;}

#drawer{
  display:none;
  position:fixed;left:-260px;top:0;bottom:0;width:220px;z-index:55;
  background:rgba(3,7,18,.97);border-right:1px solid rgba(0,212,255,.2);
  transition:left .32s cubic-bezier(.16,1,.3,1);
  padding:80px 10px 100px;
  overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(0,212,255,.3) transparent;
}
#drawer.open{left:0;}
#drawer-overlay{
  display:none;position:fixed;inset:0;z-index:54;background:rgba(0,0,0,.5);
  opacity:0;transition:opacity .3s;pointer-events:none;
}
#drawer-overlay.show{opacity:1;pointer-events:all;}
.drawer-title{font-family:'Orbitron',sans-serif;font-size:9px;color:rgba(0,212,255,.5);letter-spacing:.18em;padding:0 8px 10px;text-transform:uppercase;}

/* ── HINT ──────────────────────────────── */
#hint{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:50;
  font-size:clamp(9px,2.2vw,12px);font-family:'Orbitron',sans-serif;
  color:rgba(232,244,253,.18);letter-spacing:.12em;
  pointer-events:none;white-space:nowrap;text-align:center;width:100%;padding:0 10px;
}

/* ── CONTROLS ───────────────────────────── */
#ctrls{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:50;
  display:flex;gap:8px;
}
.btn{
  font-family:'Orbitron',sans-serif;font-size:clamp(9px,2.5vw,13px);font-weight:700;
  letter-spacing:.08em;padding:10px 14px;border:none;border-radius:4px;
  cursor:pointer;transition:all .25s;text-transform:uppercase;white-space:nowrap;
}
#xbtn{background:linear-gradient(135deg,#ff6b35,#cc2800);color:#fff;box-shadow:0 0 16px rgba(255,107,53,.38);}
#xbtn:hover,#xbtn:active{box-shadow:0 0 30px rgba(255,107,53,.7);transform:translateY(-2px);}
#rbtn{background:rgba(0,212,255,.07);color:rgba(0,212,255,.82);border:1px solid rgba(0,212,255,.3);}
#rbtn:hover,#rbtn:active{background:rgba(0,212,255,.15);transform:translateY(-2px);}

/* ── INFO PANEL ──────────────────────────── */
#panel{
  position:fixed;right:-110vw;z-index:50;
  transition:right .42s cubic-bezier(.16,1,.3,1),bottom .42s cubic-bezier(.16,1,.3,1);
  /* Desktop */
  top:50%;transform:translateY(-50%);
  width:340px;max-height:88vh;
  overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(0,212,255,.3) transparent;
}
#panel::-webkit-scrollbar{width:4px;}
#panel::-webkit-scrollbar-thumb{background:rgba(0,212,255,.3);border-radius:2px;}
#panel.open{right:14px;}

.pi{background:rgba(5,13,27,.97);border:1px solid rgba(0,212,255,.22);border-radius:12px;padding:22px 20px;position:relative;box-shadow:0 8px 60px rgba(0,0,0,.88),0 0 30px rgba(0,212,255,.07);}
.pe{font-size:38px;display:block;margin-bottom:10px;}
.pt{font-family:'Orbitron',sans-serif;font-size:11px;color:#ff6b35;letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px;}
.pn{font-family:'Orbitron',sans-serif;font-size:clamp(14px,3.5vw,17px);font-weight:700;color:#00d4ff;margin-bottom:12px;line-height:1.4;text-shadow:0 0 12px rgba(0,212,255,.38);}
.pd{font-size:clamp(14px,3.5vw,16px);line-height:1.7;color:rgba(232,244,253,.85);margin-bottom:16px;}
.sb{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.14);border-radius:8px;padding:12px;margin-bottom:12px;}
.sl{font-family:'Orbitron',sans-serif;font-size:9px;color:#00d4ff;letter-spacing:.18em;margin-bottom:6px;text-transform:uppercase;}
.st{font-size:clamp(13px,3vw,14px);color:rgba(232,244,253,.7);line-height:1.6;}
.ff{background:rgba(255,107,53,.07);border-left:3px solid #ff6b35;border-radius:0 8px 8px 0;padding:10px 12px;font-size:clamp(13px,3.5vw,15px);line-height:1.6;color:rgba(232,244,253,.85);}
#cb{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.07);border:none;color:rgba(232,244,253,.5);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:20;}
#cb:hover,#cb:active{background:rgba(255,255,255,.16);color:#fff;}

/* ── LOADER ──────────────────────────────── */
#loader{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#030712;transition:opacity .7s;}
#loader.gone{opacity:0;pointer-events:none;}
.lo{font-family:'Orbitron',sans-serif;font-size:clamp(12px,3vw,15px);color:#00d4ff;letter-spacing:.2em;margin-bottom:18px;text-shadow:0 0 20px rgba(0,212,255,.5);text-align:center;}
.lb{width:min(220px,60vw);height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.lp{height:100%;background:linear-gradient(90deg,#00d4ff,#ff6b35);border-radius:2px;animation:lbar 2s ease forwards;}
@keyframes lbar{from{width:0}to{width:100%}}

/* ── SEA LION EASTER EGG ─────────────────── */
.sea-lion{position:fixed;top:-100px;font-size:50px;z-index:500;pointer-events:none;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);}}

/* ── MOBILE BREAKPOINT ───────────────────── */
@media(max-width:680px){
  #legend{display:none;}
  #drawer-toggle{display:flex;}
  #drawer{display:block;}
  #drawer-overlay{display:block;}

  /* Panel anchors to bottom sheet on mobile */
  #panel{
    top:auto;transform:none;
    width:calc(100vw - 0px);left:0;right:0;
    bottom:-100vh;
    max-height:55dvh;
    border-radius:0;
  }
  #panel.open{right:0;bottom:0;}
  .pi{border-radius:16px 16px 0 0;padding:18px 16px 80px;}

  /* Pull-tab indicator — swipeable */
  .pi::before{
    content:'';display:block;width:40px;height:4px;
    background:rgba(255,255,255,.2);border-radius:2px;
    margin:0 auto 16px;
    cursor:grab;
  }
  /* Swipe grab zone sits over the pull-tab area */
  #swipe-zone{
    display:block;position:absolute;top:0;left:0;right:60px;height:36px;
    z-index:10;cursor:grab;border-radius:16px 0 0 0;
  }

  /* Controls shift left to avoid drawer tab */
  #ctrls{left:auto;right:14px;transform:none;flex-direction:column;align-items:flex-end;bottom:14px;gap:6px;}

  #hint{display:none;}
}

@media(max-width:380px){
  .h-title{font-size:12px;}
  .h-sub{display:none;}
  .btn{padding:8px 10px;font-size:8px;}
}
</style>
</head>
<body>

<div id="loader"><div class="lo">INITIALIZING MERIDIAN</div><div class="lb"><div class="lp"></div></div></div>

<div id="header">
  <div>
    <div class="h-title">Project Meridian</div>
    <div class="h-sub">TPOC · Tunable Plasmonic-Optomechanical Catalyst</div>
  </div>
</div>

<!-- Desktop legend -->
<div id="legend"></div>

<!-- Mobile: slide-out drawer toggle tab -->
<div id="drawer-toggle" onclick="toggleDrawer()">
  <span class="dt-icon">☰</span>
  <span class="dt-label">LAYERS</span>
</div>

<!-- Mobile: slide-out drawer -->
<div id="drawer-overlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div class="drawer-title">Select Layer</div>
  <div id="drawer-list"></div>
</div>

<div id="hint">DRAG TO ORBIT · SCROLL TO ZOOM · TAP A LAYER</div>

<div id="ctrls">
  <button class="btn" id="xbtn">⚡ EXPLODE</button>
  <button class="btn" id="rbtn">↺ RESET</button>
</div>

<div id="panel">
  <div class="pi">
    <div id="swipe-zone"></div>
    <button id="cb">✕</button>
    <span class="pe" id="pe">⚡</span>
    <div class="pt">Layer Analysis</div>
    <div class="pn" id="pn">—</div>
    <div class="pd" id="pd">—</div>
    <div class="sb"><div class="sl">🔬 Science Specs</div><div class="st" id="ps">—</div></div>
    <div class="ff" id="pf">—</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const LAYERS=[
  {name:"🪞 Plasmonic Cavity",funName:"Optical Concentrator",hex:'#e69c24',c3:0xe69c24,em:0x3a1e00,h:.2,emoji:"🪞",tex:'plasmonic',
   desc:"This wavy surface acts like a microscopic magnifying glass. It traps the invisible heat rays from the sun (near-infrared light) and focuses them to power the reactor. The wavy shape stops light from bouncing away.",
   sci:"Tunable 10.71 THz resonance | Captures light particles to supercharge electrons in the layers below.",
   fact:"☀️ When sunlight hits this special surface just right, the light waves and electrons sync up and move together, kind of like a crowd doing the wave in a stadium!"},
  {name:"⚙️ MEMS Comb Drives",funName:"Electrostatic Actuators",hex:'#98b0c4',c3:0x98b0c4,em:0x070910,h:.15,emoji:"⚙️",tex:'mems_comb',
   desc:"These are tiny mechanical motors with interlocking teeth, looking a lot like two hair combs sliding together. They use static electricity to physically move the layers and keep everything perfectly lined up, even as the machine gets incredibly hot.",
   sci:"Speed: 102.7 rad/s | Keeps parts aligned within 0.5 nanometers at 280°C (536°F).",
   fact:"⚙️ Keeping things aligned to 0.5 nanometers at that heat is like keeping a massive steel bridge from expanding more than the width of a single atom on a hot summer day."},
  {name:"🌱 Nano-Peapods",funName:"Catalytic Nanostructures",hex:'#32c979',c3:0x32c979,em:0x002010,h:.18,emoji:"🌱",tex:'peapods',
   desc:"This layer looks like tiny green peas packed inside a pod. The 'peas' are tiny clusters of cobalt and iron metals. Carbon dioxide (CO₂) gets trapped in the pod, and the metal peas act like molecular scissors to easily snip the tough CO₂ molecules apart.",
   sci:"Co-Fe / TiO₂ peapods | Pore size: 1.0 nm | Uses 'nitrogen vacancies' (empty parking spots) to trap CO₂.",
   fact:"🌱 The 1.0-nanometer pores act like a physical filter. They are so narrow that they physically stop the fuel molecules from growing too long and turning into a thick, waxy clog."},
  {name:"🏭 Reaction Zone",funName:"Fischer-Tropsch Chamber",hex:'#e6b341',c3:0xe6b341,em:0x381400,h:.22,emoji:"🏭",tex:'reaction',
   desc:"This is where the real magic happens. We mix the broken-apart carbon dioxide with hydrogen gas. In this hot, high-pressure zone, the carbon and hydrogen atoms snap together like Lego bricks to build clean liquid fuel.",
   sci:"Reaction: CO₂ + H₂O → Fuel | Temp: 280°C | Pressure: 64 bar | Heat-driven 99.8% · Light-driven 0.2%.",
   fact:"🏭 While the high heat does most of the heavy lifting, the extra 0.2% energy from the supercharged electrons is exactly what's needed to break the tough CO₂ bonds in the first place."},
  {name:"🌡️ Phase-Change Clamp",funName:"Isothermal Buffer",hex:'#559ce6',c3:0x559ce6,em:0x00102e,h:.15,emoji:"🌡️",tex:'clamp',
   desc:"Making fuel generates a lot of dangerous extra heat! This layer uses boiling water under high pressure to absorb that extra energy. It acts like a high-tech cooling blanket that locks the temperature of the whole machine at exactly 279.8°C.",
   sci:"64 bar pressure | Boiling Temp = 279.8°C | Acts as a thermal buffer to stop overheating.",
   fact:"🌡️ When water boils, its temperature stops rising until it all turns to steam. We use this natural physics trick to keep the reactor perfectly stable without needing complex electronic coolers."},
  {name:"🧽 Foam Reflector",funName:"Thermal Insulator",hex:'#b3c6d8',c3:0xb3c6d8,em:0x070a10,h:.15,emoji:"🧽",tex:'foam',
   desc:"This spongy layer is full of microscopic holes. It acts like a thermal mirror, bouncing 72.5% of the heat back up into the reaction zone so we don't waste energy heating up the bottom of the machine.",
   sci:"Sponge-like structure | Bounces back 72.5% of heat | Over 50.1% empty space.",
   fact:"🧽 Even though it looks like solid material, it's actually more than half empty air! This makes it an incredible insulator, keeping heat trapped just like a thick, puffy winter coat."},
  {name:"⚡ Bulk HfN (Rocksalt)",funName:"Hot Carrier Generator",hex:'#18b072',c3:0x18b072,em:0x002211,h:.30,emoji:"⚡",tex:'hfn_bulk',
   desc:"Normally, metals lose their heat instantly. But Hafnium Nitride (HfN) has a special structure that traps the energy. It creates supercharged 'hot electrons' that hold their energy 6 times longer than normal metals, giving them enough time to power the chemical reactions above.",
   sci:"28.1 meV energy gap | Melts at 3,310°C | Keeps electrons supercharged much longer.",
   fact:"⚡ Hafnium Nitride forms into a crystal shape called 'rocksalt'—exactly like the salt you put on your french fries—but it's so incredibly tough it's used to build rocket engines."},
  {name:"🛡️ Ni-Superalloy Foil",funName:"Structural Substrate",hex:'#7a8c9e',c3:0x7a8c9e,em:0x040810,h:.12,emoji:"🛡️",tex:'foil',
   desc:"This is the super-strong, flexible metal foundation of the entire reactor. It's only 50 micrometers thick—thinner than a human hair—but it easily survives the intense heat and massive pressure going on inside.",
   sci:"Thickness: 50 μm (thinner than a hair) | Printed using a high-speed roller process.",
   fact:"🛡️ Superalloys are the exact same advanced metals used to build the glowing-hot spinning turbine blades inside commercial jet engines!"}
];

const SUN_DATA={
  name:"☀️ Sun",funName:"G-Type Main Sequence Star",hex:"#ffb533",emoji:"☀️",
  desc:"Our primary energy source. In the vacuum of space, the sun constantly burns through nuclear fusion, blasting out a massive amount of energy. We specifically capture its invisible heat rays (near-infrared light) to power the reactor.",
  sci:"Surface Temp: ~5,778 K | Distance: 1 Astronomical Unit (93 million miles) | Energy output: 3.828 × 10²⁶ Watts",
  fact:"☀️ The sun's energy travels through 93 million miles of empty space to reach our reactor, completing the journey in just about 8 minutes and 20 seconds!"
};

// ── BUILD LEGEND & DRAWER ────────────────────────────────
const legEl=document.getElementById('legend');
const drawerList=document.getElementById('drawer-list');

function makeLegendItem(id, hex, name, clickFn) {
  const d=document.createElement('div');
  d.className='li';d.id=id;
  d.innerHTML=`<div class="ld" style="background:${hex}"></div><span class="ll">${name}</span>`;
  d.onclick=clickFn;
  return d;
}

// Sun row
const sunLiD=makeLegendItem('li-sun',SUN_DATA.hex,SUN_DATA.name,()=>selectSun());
legEl.appendChild(sunLiD);
const sunLiM=makeLegendItem('li-sun-m',SUN_DATA.hex,SUN_DATA.name,()=>{selectSun();closeDrawer();});
drawerList.appendChild(sunLiM);

LAYERS.forEach((l,i)=>{
  const d=makeLegendItem(`li${i}`,l.hex,l.name,()=>selectLayer(i));
  legEl.appendChild(d);
  const dm=makeLegendItem(`li${i}-m`,l.hex,l.name,()=>{selectLayer(i);closeDrawer();});
  drawerList.appendChild(dm);
});

function toggleDrawer(){
  const dr=document.getElementById('drawer');
  const ov=document.getElementById('drawer-overlay');
  const tog=document.getElementById('drawer-toggle');
  const opening=!dr.classList.contains('open');
  dr.classList.toggle('open');
  ov.classList.toggle('show');
  tog.classList.toggle('hidden', opening);
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('show');
  document.getElementById('drawer-toggle').classList.remove('hidden');
}

// ── SWIPE-TO-DISMISS PANEL ───────────────────────────────
(function(){
  const swipeZone=document.getElementById('swipe-zone');
  const panel=document.getElementById('panel');
  let sy=0,draggingPanel=false,currentY=0;

  swipeZone.addEventListener('touchstart',e=>{
    sy=e.touches[0].clientY;draggingPanel=true;currentY=0;
    panel.style.transition='none';
  },{passive:true});

  window.addEventListener('touchmove',e=>{
    if(!draggingPanel)return;
    const dy=e.touches[0].clientY-sy;
    if(dy>0){currentY=dy;panel.style.transform=`translateY(${dy}px)`;}
  },{passive:true});

  window.addEventListener('touchend',()=>{
    if(!draggingPanel)return;
    draggingPanel=false;
    panel.style.transition='';
    if(currentY>80){
      panel.style.transform='';
      closePanel();
    } else {
      panel.style.transform='';
    }
  });
})();

// ── CANVAS TEXTURES ──────────────────────────────────────
function makeTopTex(type,baseHex){
  const W=512,H=256,cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const c=cv.getContext('2d');
  const r=(baseHex>>16&255),g=(baseHex>>8&255),b=(baseHex&255);
  c.fillStyle=`rgb(${Math.min(r+22,255)},${Math.min(g+22,255)},${Math.min(b+22,255)})`;
  c.fillRect(0,0,W,H);
  if(type==='plasmonic'){
    for(let i=0;i<7;i++){const y0=20+i*37;c.strokeStyle='rgba(255,225,100,0.58)';c.lineWidth=5;c.beginPath();for(let x=0;x<=W;x+=3)c.lineTo(x,y0+Math.sin(x*.042)*11);c.stroke();c.strokeStyle='rgba(0,0,0,0.2)';c.lineWidth=2;c.beginPath();for(let x=0;x<=W;x+=3)c.lineTo(x,y0+5+Math.sin(x*.042)*11);c.stroke();}
  }else if(type==='mems_comb'){c.strokeStyle='rgba(0,0,0,0.25)';c.lineWidth=2;for(let x=20;x<W;x+=40){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();for(let y=20;y<H;y+=40){c.beginPath();c.moveTo(x,y);c.lineTo(x+10,y);c.stroke();}}}
  else if(type==='peapods'){c.strokeStyle='rgba(0,100,50,0.4)';c.fillStyle='rgba(0,100,50,0.6)';c.lineWidth=3;for(let x=40;x<W;x+=60){c.beginPath();c.arc(x,H/2,20,0,Math.PI*2);c.stroke();c.beginPath();c.arc(x,H/2,6,0,Math.PI*2);c.fill();}}
  else if(type==='reaction'){c.strokeStyle='rgba(200,100,0,0.4)';c.lineWidth=3;for(let x=50;x<W;x+=80){c.beginPath();c.arc(x,H/2+(Math.sin(x)*20),15,0,Math.PI*2);c.stroke();}}
  else if(type==='clamp'){c.fillStyle='rgba(50,100,200,0.3)';for(let x=30;x<W;x+=60){c.fillRect(x,H/2-25,20,50);}}
  else if(type==='foam'){c.strokeStyle='rgba(0,0,0,0.15)';c.lineWidth=2;for(let x=15;x<W;x+=30){for(let y=15;y<H;y+=30){c.beginPath();c.arc(x+Math.sin(y*x)*10,y+Math.cos(x)*10,4+(x%3)*2,0,Math.PI*2);c.stroke();}}}
  else if(type==='hfn_bulk'){
    const sp=40;
    for(let row=-1;row<H/sp+2;row++){for(let col=-1;col<W/sp+2;col++){const ox=col*sp+(row%2===0?0:sp/2),oy=row*sp;const isHf=(row+col)%2===0;if(isHf){const grd=c.createRadialGradient(ox,oy,1,ox,oy,10);grd.addColorStop(0,'rgba(210,240,255,0.98)');grd.addColorStop(.5,'rgba(140,200,255,0.7)');grd.addColorStop(1,'rgba(80,140,220,0.15)');c.beginPath();c.arc(ox,oy,10,0,Math.PI*2);c.fillStyle=grd;c.fill();c.strokeStyle='rgba(180,220,255,0.55)';c.lineWidth=1;c.stroke();}else{const grd=c.createRadialGradient(ox,oy,0,ox,oy,6);grd.addColorStop(0,'rgba(0,255,210,1)');grd.addColorStop(1,'rgba(0,180,150,0.1)');c.beginPath();c.arc(ox,oy,6,0,Math.PI*2);c.fillStyle=grd;c.fill();}c.strokeStyle='rgba(0,200,160,0.1)';c.lineWidth=.7;if(col>-1){c.beginPath();c.moveTo(ox-sp/2+(row%2===0?sp/2:0),oy);c.lineTo(ox,oy);c.stroke();}}}
    c.strokeStyle='rgba(0,200,150,0.06)';c.lineWidth=.5;for(let x=0;x<W;x+=sp){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}for(let y=0;y<H;y+=sp){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}
  }else if(type==='foil'){c.fillStyle='rgba(0,0,0,0.05)';for(let y=10;y<H;y+=20){c.fillRect(0,y,W,2);}}
  return new THREE.CanvasTexture(cv);
}
function makeSideTex(baseHex){
  const cv=document.createElement('canvas');cv.width=128;cv.height=128;const c=cv.getContext('2d');
  const r=(baseHex>>16&255),g=(baseHex>>8&255),b=(baseHex&255);
  c.fillStyle=`rgb(${r},${g},${b})`;c.fillRect(0,0,128,128);
  c.strokeStyle='rgba(255,255,255,0.07)';c.lineWidth=1;for(let x=0;x<128;x+=14){c.beginPath();c.moveTo(x,0);c.lineTo(x,128);c.stroke();}
  c.fillStyle='rgba(0,0,0,0.14)';c.fillRect(0,108,128,20);
  c.fillStyle='rgba(255,255,255,0.05)';c.fillRect(0,0,128,10);
  return new THREE.CanvasTexture(cv);
}
function makeSmoothGlowTex(){
  const cv=document.createElement('canvas');cv.width=512;cv.height=512;const c=cv.getContext('2d');
  const grd=c.createRadialGradient(256,256,0,256,256,256);
  grd.addColorStop(0,'rgba(255,255,255,1)');grd.addColorStop(0.15,'rgba(255,230,100,1)');
  grd.addColorStop(0.4,'rgba(255,100,0,0.6)');grd.addColorStop(0.7,'rgba(100,10,0,0.1)');grd.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=grd;c.fillRect(0,0,512,512);
  return new THREE.CanvasTexture(cv);
}

// ── THREE.JS ────────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.setClearColor(0x000000,0);
Object.assign(renderer.domElement.style,{position:'fixed',top:'0',left:'0',width:'100%',height:'100%',zIndex:'2'});
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
function mobileFOV(){return innerWidth<680?65:44;}
const cam=new THREE.PerspectiveCamera(mobileFOV(),innerWidth/innerHeight,.1,200);

// Stars
const starsGeo=new THREE.BufferGeometry();
const starsPos=[];
for(let i=0;i<1500;i++){const r2=40+Math.random()*60,theta=2*Math.PI*Math.random(),phi=Math.acos(2*Math.random()-1);starsPos.push(r2*Math.sin(phi)*Math.cos(theta),r2*Math.sin(phi)*Math.sin(theta),r2*Math.cos(phi));}
starsGeo.setAttribute('position',new THREE.Float32BufferAttribute(starsPos,3));
scene.add(new THREE.Points(starsGeo,new THREE.PointsMaterial({color:0xccddff,size:0.15,transparent:true,opacity:0.6})));

const sun=new THREE.Mesh(new THREE.SphereGeometry(3.0,32,32),new THREE.MeshBasicMaterial({color:0xffffee}));
sun.position.set(20,15,-25);scene.add(sun);

const glowMat=new THREE.SpriteMaterial({map:makeSmoothGlowTex(),color:0xffffff,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending,depthWrite:false});
const glowSprite=new THREE.Sprite(glowMat);glowSprite.scale.set(40,40,1);sun.add(glowSprite);

scene.add(new THREE.AmbientLight(0x0a1830,1.5));
const sunLight=new THREE.DirectionalLight(0xffddaa,1.4);sunLight.position.copy(sun.position);scene.add(sunLight);
const dl2=new THREE.DirectionalLight(0xff7040,0.8);dl2.position.set(-5,-4,2);scene.add(dl2);
const dl3=new THREE.DirectionalLight(0x00ffcc,0.4);dl3.position.set(0,5,-4);scene.add(dl3);
const pl=new THREE.PointLight(0x00d4ff,0.6,30);pl.position.set(0,6,5);scene.add(pl);
const hfnLight=new THREE.PointLight(0x00ffaa,0,10);scene.add(hfnLight);

const grp=new THREE.Group();scene.add(grp);
const LW=5.8,LD=2.5,GA=.016,GX=.7;
const aY=[],xY=[],tY=[];
let cy2=0;LAYERS.forEach(l=>{aY.push(cy2-l.h/2);cy2-=l.h+GA;});
const tA=Math.abs(cy2);LAYERS.forEach((_,i)=>aY[i]+=tA/2);
cy2=0;LAYERS.forEach(l=>{xY.push(cy2-l.h/2);cy2-=l.h+GX;});
const tX=Math.abs(cy2);LAYERS.forEach((_,i)=>xY[i]+=tX/2);
LAYERS.forEach((_,i)=>tY.push(aY[i]));

const meshes=[];
LAYERS.forEach((l,i)=>{
  const topTex=makeTopTex(l.tex,l.c3);const sideTex=makeSideTex(l.c3);
  const mkM=(tex)=>new THREE.MeshPhongMaterial({color:l.c3,emissive:l.em,shininess:25,specular:0x152535,map:tex});
  const mats=[mkM(sideTex),mkM(sideTex),mkM(topTex),mkM(sideTex),mkM(sideTex),mkM(sideTex)];
  const geo=new THREE.BoxGeometry(LW,l.h,LD);
  const mesh=new THREE.Mesh(geo,mats);
  mesh.position.y=aY[i];mesh.userData.idx=i;grp.add(mesh);meshes.push(mesh);
  const edgeMat=new THREE.LineBasicMaterial({color:i===6?0x00ffcc:0x00d4ff,transparent:true,opacity:i===6?.20:.12});
  mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),edgeMat));
  if(i===6){const sGeo=new THREE.BoxGeometry(LW+.08,l.h+.08,LD+.08);mesh.add(new THREE.Mesh(sGeo,new THREE.MeshBasicMaterial({color:0x00ffaa,transparent:true,opacity:.045,side:THREE.BackSide})));}
});

// ── INPUT STATE ─────────────────────────────────────────
let exploded=false,selIdx=-1,hovIdx=-1,autoRot=true;
const rx={c:0.35,t:0.35},ry={c:0.6,t:0.6},zm={c:12,t:12};
const target={c:new THREE.Vector3(),t:new THREE.Vector3()};
const rc=new THREE.Raycaster(),mv=new THREE.Vector2();

// ── MOUSE ───────────────────────────────────────────────
let dragging=false,px=0,py=0,cx0=0,cy0=0;
renderer.domElement.addEventListener('mousedown',e=>{dragging=true;autoRot=false;px=cx0=e.clientX;py=cy0=e.clientY;});
window.addEventListener('mousemove',e=>{
  if(dragging){ry.t+=(e.clientX-px)*.007;rx.t+=(e.clientY-py)*.004;rx.t=Math.max(-Math.PI/2+.1,Math.min(Math.PI/2-.1,rx.t));px=e.clientX;py=e.clientY;}
  mv.x=(e.clientX/innerWidth)*2-1;mv.y=-(e.clientY/innerHeight)*2+1;
});
window.addEventListener('mouseup',()=>dragging=false);
renderer.domElement.addEventListener('wheel',e=>{
  const oldZm=zm.t;zm.t=Math.max(4,Math.min(18,zm.t+e.deltaY*.008));
  if(zm.t!==oldZm){rc.setFromCamera(mv,cam);const h=rc.intersectObjects([...meshes,sun]);let pt=new THREE.Vector3();if(h.length>0){pt.copy(h[0].point);}else{const n=new THREE.Vector3().subVectors(cam.position,target.c).normalize();rc.ray.intersectPlane(new THREE.Plane().setFromNormalAndCoplanarPoint(n,target.c),pt);}target.t.lerp(pt,(oldZm-zm.t)/oldZm);}
  autoRot=false;
},{passive:true});
renderer.domElement.addEventListener('click',e=>{
  if(Math.abs(e.clientX-cx0)>5||Math.abs(e.clientY-cy0)>5)return;
  mv.x=(e.clientX/innerWidth)*2-1;mv.y=-(e.clientY/innerHeight)*2+1;
  rc.setFromCamera(mv,cam);const h=rc.intersectObjects([...meshes,sun]);
  if(h.length>0){h[0].object===sun?selectSun():selectLayer(h[0].object.userData.idx);}else{closePanel();}
});

// ── TOUCH: orbit + pinch zoom ────────────────────────────
let touch1=null,touch2=null,pinchDist0=0,tx0=0,ty0=0;

function getTouchDist(a,b){return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}

renderer.domElement.addEventListener('touchstart',e=>{
  e.preventDefault();
  autoRot=false;
  if(e.touches.length===1){
    touch1=e.touches[0];touch2=null;
    tx0=px=touch1.clientX;ty0=py=touch1.clientY;
  } else if(e.touches.length===2){
    touch1=e.touches[0];touch2=e.touches[1];
    pinchDist0=getTouchDist(touch1,touch2);
  }
},{passive:false});

renderer.domElement.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const t0=e.touches[0],t1=e.touches[1];
    const dist=getTouchDist(t0,t1);
    const delta=(pinchDist0-dist)*.04;
    const oldZm=zm.t;
    zm.t=Math.max(4,Math.min(18,zm.t+delta));
    pinchDist0=dist;
    // Aim raycaster at finger midpoint
    mv.x=((t0.clientX+t1.clientX)/2/innerWidth)*2-1;
    mv.y=-(((t0.clientY+t1.clientY)/2)/innerHeight)*2+1;
    if(zm.t!==oldZm){
      rc.setFromCamera(mv,cam);
      const h=rc.intersectObjects([...meshes,sun]);
      let pt=new THREE.Vector3();
      if(h.length>0){pt.copy(h[0].point);}
      else{const n=new THREE.Vector3().subVectors(cam.position,target.c).normalize();rc.ray.intersectPlane(new THREE.Plane().setFromNormalAndCoplanarPoint(n,target.c),pt);}
      target.t.lerp(pt,(oldZm-zm.t)/oldZm);
    }
    touch1=null;
  } else if(e.touches.length===1&&touch2===null){
    const t=e.touches[0];
    ry.t+=(t.clientX-px)*.007;rx.t+=(t.clientY-py)*.004;
    rx.t=Math.max(-Math.PI/2+.1,Math.min(Math.PI/2-.1,rx.t));
    px=t.clientX;py=t.clientY;
  }
},{passive:false});

renderer.domElement.addEventListener('touchend',e=>{
  e.preventDefault();
  if(e.changedTouches.length===1&&touch2===null){
    const t=e.changedTouches[0];
    if(Math.abs(t.clientX-tx0)<12&&Math.abs(t.clientY-ty0)<12){
      mv.x=(t.clientX/innerWidth)*2-1;mv.y=-(t.clientY/innerHeight)*2+1;
      rc.setFromCamera(mv,cam);const h=rc.intersectObjects([...meshes,sun]);
      if(h.length>0){h[0].object===sun?selectSun():selectLayer(h[0].object.userData.idx);}else{closePanel();}
    }
  }
  touch2=null;
},{passive:false});

// ── PANEL ───────────────────────────────────────────────
function syncLegendActive(){
  document.querySelectorAll('.li').forEach(el=>el.classList.remove('lit'));
  if(selIdx==='sun'){document.getElementById('li-sun').classList.add('lit');document.getElementById('li-sun-m').classList.add('lit');}
  else if(selIdx>=0){document.getElementById(`li${selIdx}`).classList.add('lit');document.getElementById(`li${selIdx}-m`)?.classList.add('lit');}
}
function selectLayer(i){
  selIdx=i;const l=LAYERS[i];
  document.getElementById('pe').textContent=l.emoji;
  document.getElementById('pn').textContent=l.funName;
  document.getElementById('pd').textContent=l.desc;
  document.getElementById('ps').textContent=l.sci;
  document.getElementById('pf').textContent=l.fact;
  document.getElementById('panel').classList.add('open');
  syncLegendActive();
}
function selectSun(){
  selIdx='sun';
  document.getElementById('pe').textContent=SUN_DATA.emoji;
  document.getElementById('pn').textContent=SUN_DATA.funName;
  document.getElementById('pd').textContent=SUN_DATA.desc;
  document.getElementById('ps').textContent=SUN_DATA.sci;
  document.getElementById('pf').textContent=SUN_DATA.fact;
  document.getElementById('panel').classList.add('open');
  syncLegendActive();
}
function closePanel(){
  selIdx=-1;
  document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('.li').forEach(el=>el.classList.remove('lit'));
}
document.getElementById('cb').onclick=closePanel;

// ── CONTROLS ────────────────────────────────────────────
document.getElementById('xbtn').addEventListener('click',()=>{
  exploded=!exploded;const b=document.getElementById('xbtn');
  if(exploded){b.textContent='🔩 ASSEMBLE';b.style.background='linear-gradient(135deg,#0088cc,#004488)';b.style.boxShadow='0 0 16px rgba(0,136,204,.38)';LAYERS.forEach((_,i)=>tY[i]=xY[i]);zm.t=window.innerWidth<680?18:16;}
  else{b.textContent='⚡ EXPLODE';b.style.background='linear-gradient(135deg,#ff6b35,#cc2800)';b.style.boxShadow='0 0 16px rgba(255,107,53,.38)';LAYERS.forEach((_,i)=>tY[i]=aY[i]);zm.t=window.innerWidth<680?10:12;}
});
document.getElementById('rbtn').onclick=()=>{rx.t=0.35;ry.t=0.6;zm.t=window.innerWidth<680?13:12;autoRot=true;target.t.set(0,0,0);};

// ── EASTER EGG ───────────────────────────────────────────
let typed="";
window.addEventListener('keydown',e=>{
  typed+=e.key.toLowerCase();typed=typed.slice(-9);
  if(typed==="blackhole"){typed="";startSeaLionRain();}
});
function startSeaLionRain(){
  for(let i=0;i<40;i++){setTimeout(()=>{const l=document.createElement('div');l.className='sea-lion';l.textContent='🦭';l.style.left=Math.random()*100+'vw';l.style.animationDuration=(Math.random()*2+1)+'s';l.style.fontSize=(Math.random()*40+30)+'px';document.body.appendChild(l);setTimeout(()=>l.remove(),3000);},Math.random()*3000);}
}

// ── RENDER LOOP ──────────────────────────────────────────
const clk=new THREE.Clock();
const eT=new THREE.Color();
const _v3=new THREE.Vector3();
function lerp(a,b,t){return a+(b-a)*t;}

// Adjust initial zoom for mobile
if(window.innerWidth<680){zm.c=zm.t=13;}

function animate(){
  requestAnimationFrame(animate);
  const t=clk.getElapsedTime();
  if(autoRot)ry.t-=.003;
  rx.c=lerp(rx.c,rx.t,.075);ry.c=lerp(ry.c,ry.t,.075);zm.c=lerp(zm.c,zm.t,.08);
  target.c.lerp(target.t,.08);
  cam.position.x=target.c.x+zm.c*Math.cos(rx.c)*Math.sin(ry.c);
  cam.position.y=target.c.y+zm.c*Math.sin(rx.c);
  cam.position.z=target.c.z+zm.c*Math.cos(rx.c)*Math.cos(ry.c);
  cam.lookAt(target.c);

  if(!dragging&&touch2===null){
    rc.setFromCamera(mv,cam);const h=rc.intersectObjects([...meshes,sun]);
    hovIdx=h.length>0?(h[0].object===sun?'sun':h[0].object.userData.idx):-1;
    renderer.domElement.style.cursor=hovIdx!==-1?'pointer':'grab';
  }

  const isSunSel=selIdx==='sun',isSunHov=hovIdx==='sun';
  glowSprite.material.opacity=lerp(glowSprite.material.opacity,(isSunSel||isSunHov)?1.0:0.6,0.1);

  meshes.forEach((mesh,i)=>{
    mesh.position.y=lerp(mesh.position.y,tY[i],.09);
    const em=LAYERS[i].em,br=(em>>16&255)/255,bg=(em>>8&255)/255,bb=(em&255)/255;
    const hfnPulse=i===6?(0.15+.1*Math.sin(t*2.0)):0;
    const isSel=selIdx===i,isHov=hovIdx===i;
    if(isSel)eT.setRGB(br+.08,bg+.10,bb+.14);
    else if(isHov)eT.setRGB(br+.04,bg+.05,bb+.07);
    else eT.setRGB(br+hfnPulse*.02,bg+hfnPulse*.06,bb+hfnPulse*.04);
    mesh.material.forEach(m=>{if(m.emissive)m.emissive.lerp(eT,.12);});
    const lines=mesh.children.find(c=>c.isLineSegments);
    if(lines)lines.material.opacity=lerp(lines.material.opacity,isHov||isSel?.5:.18,.1);
  });

  meshes[6].getWorldPosition(_v3);hfnLight.position.copy(_v3);hfnLight.intensity=0.40;
  renderer.render(scene,cam);
}
animate();

window.addEventListener('resize',()=>{
  cam.fov=mobileFOV();
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
setTimeout(()=>document.getElementById('loader').classList.add('gone'),2100);
setTimeout(()=>autoRot=false,7500);
</script>
</body>
</html>
